services:
  mongodb:
    image: mongo:7
    container_name: notification-service-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - notification_mongodb_data:/data/db

  notification-service:
    build: .
    restart: unless-stopped
    environment:
      SERVER_PORT: 8082
      MONGODB_URI: mongodb://mongodb:27017/notification_db
      CONFIG_SERVER_IMPORT: optional:configserver:http://host.docker.internal:8099
      EUREKA_URL: http://host.docker.internal:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: host.docker.internal
    ports:
      - "8082:8082"
    depends_on:
      - mongodb
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  notification_mongodb_data:

