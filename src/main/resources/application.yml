server:
  port: 8082

spring:
  application:
    name: notification-service
  config:
    import: ${CONFIG_SERVER_IMPORT:optional:configserver:http://localhost:8099}
  cloud:
    config:
      fail-fast: ${CONFIG_SERVER_FAIL_FAST:false}
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27018/notification_db}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
